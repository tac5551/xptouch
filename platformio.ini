; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev, esp32-s3dev

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
	#https://github.com/tac5551/LovyanGFX.git
	lvgl/lvgl@8.3.9
	https://github.com/knolleary/pubsubclient.git
	ArduinoJson@6.21.5
	FS
	SD
	https://github.com/PaulStoffregen/OneWire.git#v2.3.8
	https://github.com/milesburton/Arduino-Temperature-Control-Library.git#v4.0.3
	https://github.com/ESP32Async/ESPAsyncWebServer.git
	https://github.com/tuan-karma/ESP32_WiFiClientSecure.git
	https://github.com/lvgl/lv_lib_png.git
	adafruit/Adafruit NeoPixel@^1.12.0
build_flags = 
	-D LV_CONF_PATH="${PROJECT_DIR}/resources/lv_conf.h"
	-D LV_LVGL_H_INCLUDE_SIMPLE
	; SD 連続書き込みと LCD の競合緩和（net.h downloadFileToSDCard の vTaskDelay 間隔、バイト）
	-DXTOUCH_NET_SD_WRITE_YIELD_EVERY_BYTES=4096
	!python scripts/version.py

extra_scripts = 
	pre:scripts/pre-build.py

# エラーファイルの選択（3.5"/5"とも bbl-errors_old は未使用のため除外）
build_src_filter = 
	+<*>
	-<xtouch/bbl/bbl-errors_old.c>

[env:esp32dev]
board = esp32dev
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
monitor_filters = esp32_exception_decoder
build_src_filter = 
	+<*>
	-<xtouch/bbl/bbl-errors_old.c>
	-<font/>   ; 2.8は日本語フォント未使用のため両方除外
build_flags = 
	${env.build_flags} 
	-D__XTOUCH_SCREEN_28__
	-DLGFX_ESP32_3248S035R
	-DLGFX_ESP32_3248S035C

	; -O0

extra_scripts = 
	${env.extra_scripts} 
	post:scripts/post-build.py

; 2.8" 開発・シリアルデバッグ用。Upload 時は -e esp32dev-debug を指定。
[env:esp32dev-debug]
extends = esp32dev
board = esp32dev
; build_src_filter も子 env では [env] だけになることがあるため親を明示。
build_src_filter = 
	${env:esp32dev.build_src_filter}
; 子 env では ${env.build_flags} が [env] だけになり親の -D__XTOUCH_* が落ちる。親名で明示する。
build_flags = 
	${env:esp32dev.build_flags}
#	-DLGFX_FORCE_DETECT
	-DCORE_DEBUG_LEVEL=5
	-DARDUINO_LOG_LEVEL=5
	-DESP32_LOG_LEVEL=5
	-DXTOUCH_DEBUG
	
extra_scripts = 
	${env:esp32dev.extra_scripts}

[env:esp32-s3dev]
board = esp32-s3-devkitc1-n16r8
; thumbnail は chamber と同様 .h に実装。thumbnail.cpp はビルドしない。
build_src_filter = 
	+<*>
	-<xtouch/bbl/bbl-errors_old.c>
	-<font/lv_font_notosans_14.c>   ; 5インチは28のみ（14は不要）
build_flags = 
	${env.build_flags} 
	-D__XTOUCH_SCREEN_50__
	-I $PROJECT_DIR/lib/LovyanGFX/src

extra_scripts = 
	${env.extra_scripts} 
	post:scripts/post-build50.py

; 5" 開発・シリアルデバッグ用。Upload 時は -e esp32-s3dev-debug を指定。
[env:esp32-s3dev-debug]
extends = esp32-s3dev
board = esp32-s3-devkitc1-n16r8
build_src_filter = 
	${env:esp32-s3dev.build_src_filter}
build_flags = 
	${env:esp32-s3dev.build_flags}
	-DCORE_DEBUG_LEVEL=5
	-DARDUINO_LOG_LEVEL=5
	-DESP32_LOG_LEVEL=5
	-DXTOUCH_DEBUG
	; -DXTOUCH_CLOUD_DEBUG
extra_scripts = 
	${env:esp32-s3dev.extra_scripts}